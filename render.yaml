services:
  - type: web
    name: verifiable-rag-assistant
    env: python
    buildCommand: pip install -r requirements.txt && python download_models.py
    startCommand: python start.py
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: true # User must configure this in Render dashboard
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: RERANKER_MODEL
        value: ""
      - key: FRONTEND_TIMEOUT
        value: "60.0"
      - key: PYTHON_VERSION
        value: "3.12"
